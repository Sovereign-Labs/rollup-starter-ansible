---
# Build a single version of the rollup via ansible-playbook subprocess

- name: Set version output paths
  set_fact:
    version_output_dir: "{{ versions_output_dir }}/{{ version.version_id }}"
    version_genesis_folder: "{{ genesis_folder if version_index == 0 else '' }}"
    version_build_db_migration: "{{ version.build_db_migration | default(false) | bool }}"
    version_db_migration_crate: "{{ version.rollup_db_migration_crate | default(rollup_db_migration_crate | default('rollup-db-migration')) }}"

- name: Create version output directory
  ansible.builtin.file:
    path: "{{ version_output_dir }}"
    state: directory
    owner: sovereign
    group: sovereign
    mode: '0755'
  become: true

- name: Create genesis directory (first version only)
  ansible.builtin.file:
    path: "{{ version_genesis_folder }}"
    state: directory
    owner: sovereign
    group: sovereign
    mode: '0755'
  become: true
  when: version_index == 0 and version_genesis_folder | length > 0

- name: Checkout ansible repo at version-specific commit
  become: true
  become_user: ubuntu
  git:
    repo: "{{ ansible_repo_url }}"
    dest: "{{ ansible_checkout_dir }}"
    version: "{{ version.ansible_commit }}"
    force: yes

- name: Check if runtime_vars_file exists on controller
  stat:
    path: "{{ runtime_vars_file }}"
  delegate_to: localhost
  become: false
  register: build_runtime_vars_stat

- name: Copy runtime vars to remote for build subprocess
  ansible.builtin.copy:
    src: "{{ runtime_vars_file }}"
    dest: "/tmp/build_runtime_vars.yaml"
    mode: '0644'
  become: true
  when: build_runtime_vars_stat.stat.exists

- name: Build base vars argument
  set_fact:
    base_vars_arg: "{{ '-e @/tmp/build_runtime_vars.yaml' if build_runtime_vars_stat.stat.exists else '' }}"

- name: Check for secrets/override files on controller
  stat:
    path: "{{ playbook_dir }}/vars/{{ item }}"
  delegate_to: localhost
  become: false
  loop:
    - custom_overrides.yaml
    - celestia_secrets.yaml
    - monitoring_secrets.yaml
    - hyperlane_secrets.yaml
  register: secrets_files_stat

- name: Copy secrets files to remote for build subprocess
  ansible.builtin.copy:
    src: "{{ item.stat.path }}"
    dest: "/tmp/build_{{ item.item }}"
    mode: '0600'
  become: true
  loop: "{{ secrets_files_stat.results }}"
  when: item.stat.exists

- name: Build secrets vars arguments
  set_fact:
    secrets_vars_arg: >-
      {% for result in secrets_files_stat.results %}
      {% if result.stat.exists %}-e @/tmp/build_{{ result.item }} {% endif %}
      {% endfor %}

# Per-version overrides come either inline (version.vars, written to a temp
# file here) or from a file in the config repo checkout (version.vars_file).
# Inline vars keep the whole version spec expressible as plain variables, so
# it can be passed end-to-end (e.g. from CDK) without a config repo.
- name: Write inline version vars for build subprocess
  ansible.builtin.copy:
    content: "{{ version['vars'] | to_nice_yaml }}"
    dest: "/tmp/build_version_vars_{{ version.version_id }}.yaml"
    mode: '0644'
  become: true
  when: version['vars'] is defined and version['vars'] | length > 0

- name: Build override vars argument
  set_fact:
    override_vars_arg: >-
      {{
        '-e @/tmp/build_version_vars_' + version.version_id + '.yaml'
        if (version['vars'] is defined and version['vars'] | length > 0)
        else ('-e @' + config_checkout_dir + '/' + version.vars_file
              if (version.vars_file is defined and version.vars_file | length > 0)
              else '')
      }}

# Derived here in the parent's `switches` context because the sub-playbook is
# launched with `-e switches=b`, which would make the same expression in
# roles/rollup-build/tasks/build_config.yaml resolve to 0.0.0.0 regardless of
# whether the parent run included `p`. We pass the resolved value via
# `-e rollup_http_host=...`; build_config.yaml's derivation then short-circuits
# on the non-empty input.
- name: Derive rollup HTTP bind host for version build
  set_fact:
    rollup_http_bind_host: >-
      {{
        rollup_http_host
        if (rollup_http_host | default('') | string | length > 0)
        else ('127.0.0.1' if 'p' in (switches | default('')) else '0.0.0.0')
      }}

- name: Build version command
  set_fact:
    build_command: >-
      ansible-playbook {{ ansible_checkout_dir }}/local.yml
      -i {{ ansible_checkout_dir }}/inventory/localhost.ini
      {{ secrets_vars_arg }}
      {{ base_vars_arg }}
      {{ override_vars_arg }}
      -e switches=b
      -e binary_folder={{ version_output_dir }}
      -e config_folder={{ version_output_dir }}
      -e genesis_folder={{ version_genesis_folder }}
      -e rollup_http_host={{ rollup_http_bind_host | quote }}
      -e rollup_http_port={{ rollup_http_port }}
      -e rollup_storage_dir={{ rollup_storage_dir }}
      -e build_db_migration={{ version_build_db_migration | lower }}
      -e rollup_db_migration_crate={{ version_db_migration_crate | quote }}

- name: Display build command for version {{ version.version_id }}
  debug:
    msg: "{{ build_command }}"

- name: Run build playbook for version {{ version.version_id }}
  ansible.builtin.command:
    cmd: "{{ build_command }}"
  become: true
  register: build_result
  async: 7200
  poll: 60
  ignore_errors: true

- name: Display build output for version {{ version.version_id }}
  debug:
    msg: |
      === Build stdout ===
      {{ build_result.stdout | default('(no stdout)') }}
      === Build stderr ===
      {{ build_result.stderr | default('(no stderr)') }}
  when: build_result is defined

- name: Fail if build command failed
  fail:
    msg: "Build command failed for version {{ version.version_id }} with rc={{ build_result.rc }}"
  when: build_result.rc != 0

- name: Verify version binary was built
  stat:
    path: "{{ version_output_dir }}/rollup"
  register: version_binary_stat
  become: true

- name: Fail if version binary was not built
  fail:
    msg: "Build completed but binary not found at {{ version_output_dir }}/rollup"
  when: not version_binary_stat.stat.exists
