---
# Rollup Deployment Role Defaults
# Build-related defaults are in roles/rollup-build/defaults/main.yaml

# The rollup manager coordinates rollup binary execution and version upgrades
# GitHub repository for the rollup manager
rollup_manager_repo: "https://github.com/Sovereign-Labs/sov-rollup-manager"
rollup_manager_repo_dir: "sov-rollup-manager"
rollup_manager_branch: "master"

# Rollup manager paths
rollup_manager_bin: "rollup-manager"
rollup_manager_config_path: "/home/sovereign/rollup-manager-config.json"
rollup_manager_checkpoint_path: "/home/sovereign/checkpoint.json"

# Output folders - used by rollup-build and manager config template
binary_folder: "/home/sovereign"
config_folder: "/home/sovereign"
genesis_folder: "/home/sovereign/genesis"

# Multi-version build configuration
# When rollup_config_repo is defined, multi-version build mode is enabled
# rollup_config_repo: "https://github.com/Sovereign-Labs/rollup-config.git"
rollup_config_repo_branch: "master"

# Ansible repo URL (for checking out version-specific commits in multi-version mode)
ansible_repo_url: "https://github.com/Sovereign-Labs/rollup-starter-ansible.git"

# Checkout directories for multi-version builds
ansible_checkout_dir: "/home/ubuntu/ansible-checkout"
config_checkout_dir: "/home/ubuntu/rollup-config"

# Output base directory for multi-version builds
versions_output_dir: "/home/sovereign/versions"

# Binary name - used by manager config template
rollup_bin: "rollup"

# Network ports
# Leave empty to keep the backend private when the proxy role is enabled and
# public otherwise.
rollup_http_host: ""
rollup_http_port: 12346

# Sequencer address - used for telegraf monitoring
rollup_sequencer_address: "0xA6edfca3AA985Dd3CC728BFFB700933a986aC085"

# ZKVM role - used for MOTD display
zkvm_role: "mock_zkvm"

custom_rust_log: ""

# OpenTelemetry mode: "off", "logs", or "full"
# - off: No telemetry (or when opentelemetry_available is false)
# - logs: Only logs via OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
# - full: Full telemetry via SOV_OTEL_ENABLED
opentelemetry_mode: "logs"

# Price oracle integration
# When oracle_enabled is true, the rollup connects to the configured oracle
# source(s) to receive price feeds, and the rollup is started with
# --oracle-config-path. The oracle config is always rendered to
# oracle_config_path (even when disabled) so the file stays available for
# inspection/debugging, but the flag is only passed when enabled -- rollup
# binaries without oracle support reject the unknown argument.
oracle_enabled: false
# When true, the rollup blocks startup until every configured source connects
# (and fails to start if they don't within the rollup's timeout). Only takes
# effect when oracle_enabled is true.
oracle_require_sources: false
# Node-level path for the rendered oracle config.
oracle_config_path: "/home/sovereign/oracle.toml"
# Oracle price-feed sources. Each entry:
#   - name:     unique identifier for the source (required)
#     provider: expected ingester provider id, e.g. "stork" or "chainlink" (required)
#     address:  "host:port" the oracle client connects to (required)
# At least one source is required when oracle_enabled is true.
# Example:
#   oracle_sources:
#     - name: "chainlink-1"
#       provider: "chainlink"
#       address: "127.0.0.1:9801"
#     - name: "stork-1"
#       provider: "stork"
#       address: "127.0.0.1:9804"
oracle_sources: []

# Wipe rollup data directory on deployment (use with caution)
wipe: false

# Optional PostgreSQL connection string for sequencer
# rollup_sequencer_postgres_connection_string: "postgresql://user:pass@host/db"

# Local PostgreSQL configuration
# Used when rollup_sequencer_postgres_connection_string is not provided
# TODO: Remove this. It should be always provided and don't duplicate this logic.
postgres_db_name: "rollup"
postgres_db_user: "rollup"
postgres_db_password: "rollup_secure_password"

# DA selector - passed to rollup-build role
# Must be provided by user: "celestia" or "mock_da"
# data_availability_role: "mock_da"
