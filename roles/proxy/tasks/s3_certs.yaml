---
# Restore Let's Encrypt state from S3 so a replacement proxy boots straight
# into HTTPS. Skips the sync when the local cert is already fresh + covers all
# SANs; otherwise deletes the stale live/ dir so certbot re-issues cleanly.

- name: Initialize cert restored flag
  set_fact:
    proxy_cert_restored: false

- name: Ensure /etc/letsencrypt exists
  become: true
  file:
    path: /etc/letsencrypt
    state: directory
    mode: '0755'

- name: Assess local cert (pre-sync)
  include_tasks: _assess_cert.yaml
  vars:
    _check_path: "{{ proxy_letsencrypt_live_dir }}"

- name: Capture local cert status
  set_fact:
    _local_cert_ok: "{{ _check_cert_ok }}"

- name: Sync certs from S3 (local cert missing or stale)
  become: true
  command: >
    {{ proxy_aws_cli_bin }} s3 sync
    s3://{{ proxy_cert_s3_bucket }}/{{ proxy_cert_s3_prefix }}
    /etc/letsencrypt/
    --region {{ proxy_cert_s3_region }}
    --quiet
  register: _s3_restore
  changed_when: _s3_restore.stdout | default('') | length > 0
  failed_when: false
  when: not _local_cert_ok

# Missing bucket / empty prefix is fine (first-time setup); surface other
# failures so operators see auth or network errors before falling through to
# certbot.
- name: Warn on S3 cert sync failure
  ansible.builtin.debug:
    msg: |
      S3 cert restore failed (rc={{ _s3_restore.rc }}). Proceeding to certbot.
      stderr: {{ _s3_restore.stderr | default('') }}
  when:
    - not _local_cert_ok
    - _s3_restore.rc | default(0) != 0

- name: Migrate legacy letsencrypt.tar.gz layout if prefix is empty
  import_tasks: migrate_legacy_tarball.yaml
  when: not _local_cert_ok

- name: Assess restored cert
  include_tasks: _assess_cert.yaml
  vars:
    _check_path: "{{ proxy_letsencrypt_live_dir }}"
  when: not _local_cert_ok

- name: Capture restored cert status
  set_fact:
    _restored_cert_ok: "{{ _check_cert_ok | default(false) }}"
  when: not _local_cert_ok

- name: Stat restored live cert directory
  become: true
  stat:
    path: "{{ proxy_letsencrypt_live_dir }}"
  register: _restored_live_dir
  when: not _local_cert_ok

- name: Remove stale restored cert if invalid or bundle incomplete
  become: true
  file:
    path: "{{ proxy_letsencrypt_live_dir }}"
    state: absent
  when:
    - not _local_cert_ok
    - _restored_live_dir.stat.exists | default(false)
    - not (_restored_cert_ok | default(false))

- name: Mark cert restored
  set_fact:
    proxy_cert_restored: true
  when: _local_cert_ok or (_restored_cert_ok | default(false))
