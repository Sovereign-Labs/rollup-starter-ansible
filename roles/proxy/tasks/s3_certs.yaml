---
# Restore Let's Encrypt state from S3 so a replacement proxy boots straight
# into HTTPS. Downloads a tarball (tar preserves certbot's live/ -> archive/
# symlinks, which `aws s3 sync` would break) and extracts it. Skips the restore
# when the local cert is already fresh + covers all SANs; otherwise deletes the
# stale live/ dir so certbot re-issues cleanly.

- name: Initialize cert restored flag
  set_fact:
    proxy_cert_restored: false

- name: Ensure /etc/letsencrypt exists
  become: true
  file:
    path: /etc/letsencrypt
    state: directory
    mode: '0755'

- name: Assess local cert (pre-restore)
  include_tasks: _assess_cert.yaml
  vars:
    _check_path: "{{ proxy_letsencrypt_live_dir }}"

- name: Capture local cert status
  set_fact:
    _local_cert_ok: "{{ _check_cert_ok }}"

- name: Download cert tarball from S3 (local cert missing or stale)
  become: true
  command: >
    {{ proxy_aws_cli_bin }} s3 cp
    s3://{{ proxy_cert_s3_bucket }}/{{ proxy_cert_s3_key }}
    /tmp/proxy-letsencrypt-restore.tar.gz
    --region {{ proxy_cert_s3_region }}
    --quiet
  register: _s3_restore_cp
  changed_when: _s3_restore_cp.rc == 0
  failed_when: false
  when: not _local_cert_ok

# A missing tarball (rc != 0) is the EXPECTED first-time / fresh-replacement
# path: we fall through to certbot below. Surface rc/stderr only so auth or
# network errors stay visible to operators.
- name: Note S3 cert restore outcome
  ansible.builtin.debug:
    msg: |
      No cert tarball restored from S3 (rc={{ _s3_restore_cp.rc | default('n/a') }}).
      Proceeding to certbot. stderr: {{ _s3_restore_cp.stderr | default('') }}
  when:
    - not _local_cert_ok
    - _s3_restore_cp.rc | default(1) != 0

- name: Extract cert tarball into /etc
  become: true
  command: tar xzf /tmp/proxy-letsencrypt-restore.tar.gz -C /etc
  changed_when: true
  when:
    - not _local_cert_ok
    - _s3_restore_cp.rc | default(1) == 0

- name: Clean up restore tarball
  become: true
  file:
    path: /tmp/proxy-letsencrypt-restore.tar.gz
    state: absent
  when: not _local_cert_ok

- name: Assess restored cert
  include_tasks: _assess_cert.yaml
  vars:
    _check_path: "{{ proxy_letsencrypt_live_dir }}"
  when: not _local_cert_ok

- name: Capture restored cert status
  set_fact:
    _restored_cert_ok: "{{ _check_cert_ok | default(false) }}"
  when: not _local_cert_ok

- name: Stat restored live cert directory
  become: true
  stat:
    path: "{{ proxy_letsencrypt_live_dir }}"
  register: _restored_live_dir
  when: not _local_cert_ok

- name: Remove stale restored cert if invalid or bundle incomplete
  become: true
  file:
    path: "{{ proxy_letsencrypt_live_dir }}"
    state: absent
  when:
    - not _local_cert_ok
    - _restored_live_dir.stat.exists | default(false)
    - not (_restored_cert_ok | default(false))

- name: Mark cert restored
  set_fact:
    proxy_cert_restored: true
  when: _local_cert_ok or (_restored_cert_ok | default(false))
