---
# OpenResty reverse proxy for Sovereign rollup.

- name: Validate proxy role inputs
  assert:
    that:
      - proxy_rollup_leader_ip is defined and proxy_rollup_leader_ip | length > 0
      - rollup_http_port is defined and rollup_http_port | string | length > 0
      - (proxy_unlimited_domains | length > 0) == (proxy_api_keys | length > 0)
      - (proxy_public_domains | intersect(proxy_unlimited_domains)) | length == 0
    fail_msg: >-
      Proxy role requires:
      proxy_rollup_leader_ip set;
      rollup_http_port set (defined by rollup role; set in runtime_vars when running `switches=p` alone);
      proxy_unlimited_domains and proxy_api_keys must be both empty or both non-empty
      (unlimited-domain hosts only serve /rpc/<api_key>, so one without the other is a misconfig);
      proxy_public_domains and proxy_unlimited_domains must not overlap
      (nginx silently drops duplicate server_name blocks, bypassing API-key auth).

- name: Validate SSL inputs
  assert:
    that:
      - (proxy_public_domains + proxy_unlimited_domains) | length > 0
      - proxy_certbot_email is defined and proxy_certbot_email | length > 0
      - (proxy_cert_s3_bucket | length == 0) or (proxy_cert_s3_region | length > 0)
    fail_msg: >-
      proxy_ssl_enabled requires at least one entry across proxy_public_domains
      or proxy_unlimited_domains, proxy_certbot_email, and (if S3 backup used)
      proxy_cert_s3_region.
  when: proxy_ssl_enabled | bool

- name: Compute cert vars
  set_fact:
    _proxy_all_cert_domains: "{{ proxy_public_domains + proxy_unlimited_domains }}"
    proxy_letsencrypt_live_dir: "/etc/letsencrypt/live/{{ (proxy_public_domains + proxy_unlimited_domains) | first }}"
  when: proxy_ssl_enabled | bool

# Detect existing cert before the initial render so a re-run on a healthy HTTPS
# proxy emits HTTPS config straight away instead of downgrading to HTTP-only
# until the post-certbot re-render later in the play.
- name: Assess existing cert for HTTPS readiness (pre-render)
  include_tasks: _assess_cert.yaml
  vars:
    _check_path: "{{ proxy_letsencrypt_live_dir }}"
    _check_threshold_days: 0          # servable now (not expired); 30d freshness is for renew/restore
  when: proxy_ssl_enabled | bool

- name: Set HTTPS readiness flag (pre-render)
  set_fact:
    proxy_https_ready: "{{ _check_cert_ok | default(false) }}"
  when: proxy_ssl_enabled | bool

# Mixed-host: rollup tuning takes precedence; clean up stale proxy drop-in.
- name: remove stale proxy sysctl drop-in when rollup is also active
  become: true
  ansible.builtin.file:
    path: /etc/sysctl.d/20-proxy.conf
    state: absent
  when: "'r' in (switches | default('p'))"

- name: tune kernel for nginx proxy workload
  import_tasks: system_tuner.yaml
  when: "'r' not in (switches | default('p'))"

- name: Install OpenResty dependencies
  become: true
  apt:
    name: [wget, gnupg, ca-certificates, lsb-release]
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Check for existing OpenResty keyring
  stat:
    path: /usr/share/keyrings/openresty.gpg
  register: _openresty_keyring

# Official fingerprint: E522 18E7 0878 97DC 6DEA 6D6D 97DB 7443 D5ED EB74
# Source: https://openresty.org/en/linux-packages.html
- name: Install OpenResty GPG key
  become: true
  when: not _openresty_keyring.stat.exists
  block:
    - name: Download OpenResty GPG key
      get_url:
        url: https://openresty.org/package/pubkey.gpg
        dest: /tmp/openresty-pubkey.gpg
        mode: '0644'

    - name: Verify OpenResty GPG key fingerprint
      shell: |
        FINGERPRINT=$(gpg --with-fingerprint --with-colons /tmp/openresty-pubkey.gpg 2>/dev/null | grep '^fpr' | head -1 | cut -d: -f10)
        EXPECTED="E52218E7087897DC6DEA6D6D97DB7443D5EDEB74"
        if [ "$FINGERPRINT" != "$EXPECTED" ]; then
          echo "ERROR: GPG key fingerprint mismatch! Expected $EXPECTED got $FINGERPRINT"
          exit 1
        fi
      changed_when: false

    - name: Dearmor and install OpenResty GPG key
      shell: gpg --dearmor < /tmp/openresty-pubkey.gpg > /usr/share/keyrings/openresty.gpg
      args:
        creates: /usr/share/keyrings/openresty.gpg

- name: Add OpenResty repository
  become: true
  apt_repository:
    repo: "deb [arch={{ ansible_architecture | regex_replace('x86_64', 'amd64') | regex_replace('aarch64', 'arm64') }} signed-by=/usr/share/keyrings/openresty.gpg] http://openresty.org/package/ubuntu {{ ansible_distribution_release }} main"
    state: present
    filename: openresty

- name: Install OpenResty
  become: true
  apt:
    name: openresty
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Create OpenResty systemd override directory
  become: true
  file:
    path: /etc/systemd/system/openresty.service.d
    state: directory
    mode: '0755'

# LimitNOFILE only takes effect at service start; daemon-reload + SIGHUP won't
# reach the running master. `reload systemd` runs before `restart openresty`
# (declared in that order in handlers/main.yaml).
- name: Configure OpenResty file descriptor limits
  become: true
  copy:
    content: |
      [Service]
      LimitNOFILE=65535
    dest: /etc/systemd/system/openresty.service.d/limits.conf
    mode: '0644'
  notify:
    - reload systemd
    - restart openresty

# Land the FD-limit restart now, before any config is rendered. apt-install
# auto-starts openresty at the default 1024 soft limit; if that master survives
# to the end-of-play flush, the `reload openresty` (SIGHUP) notified by the
# config templates fires *before* `restart openresty` in handler order and logs
# a spurious "worker_connections exceed open file resource limit: 1024". Flushing
# here restarts the master to 65535 first, so later reloads stay quiet.
- name: Apply FD-limit override before any config reload
  meta: flush_handlers

- name: Install certbot and cert inspection deps
  become: true
  apt:
    name:
      - certbot
      - python3-cryptography   # community.crypto.x509_certificate_info (_assess_cert.yaml)
    state: present
  when: proxy_ssl_enabled | bool

- name: Create certbot webroot directory
  become: true
  file:
    path: "{{ proxy_certbot_webroot }}"
    state: directory
    mode: '0755'
  when: proxy_ssl_enabled | bool

- name: Install AWS CLI via snap (for S3 cert sync)
  become: true
  command: snap install aws-cli --classic
  args:
    creates: /snap/bin/aws
  when:
    - proxy_ssl_enabled | bool
    - proxy_cert_s3_bucket | length > 0

- name: Create OpenResty conf.d directory
  become: true
  file:
    path: /usr/local/openresty/nginx/conf/conf.d
    state: directory
    mode: '0755'

- name: Create nginx log directory
  become: true
  file:
    path: /var/log/nginx
    state: directory
    mode: '0755'

- name: Ensure logrotate is installed
  become: true
  apt:
    name: logrotate
    state: present

- name: Install nginx logrotate config
  become: true
  template:
    src: openresty.logrotate.j2
    dest: /etc/logrotate.d/openresty
    mode: '0644'

- name: Ensure logrotate timer override directory exists
  become: true
  file:
    path: /etc/systemd/system/logrotate.timer.d
    state: directory
    mode: '0755'

- name: Run logrotate hourly (override the vendor daily timer)
  become: true
  copy:
    dest: /etc/systemd/system/logrotate.timer.d/hourly.conf
    mode: '0644'
    content: |
      # Managed by Ansible (proxy role). Check logrotate hourly so `maxsize` in
      # /etc/logrotate.d/openresty caps nginx log disk use between daily runs.
      # Empty OnCalendar= clears the inherited daily schedule before setting hourly.
      [Timer]
      OnCalendar=
      OnCalendar=hourly
  notify: restart logrotate timer

# Both build a dynamic .so the openresty-{http,https}.conf `load_module`
# directives reference, so they must run before the config templates render.
- name: Configure GeoIP2 country blocking
  import_tasks: geoip.yaml
  when: proxy_geoip_enabled | bool

- name: Configure VTS metrics module
  import_tasks: vts.yaml
  when: proxy_vts_enabled | bool

# http-base.conf references `init_by_lua_file {{ proxy_node_discovery_output_file }}`
# which must exist with valid Lua before nginx first starts; the real content
# is written by the node-discovery service at runtime.
- name: Ensure node-discovery output directory exists
  become: true
  file:
    path: "{{ proxy_node_discovery_output_file | dirname }}"
    state: directory
    mode: '0755'
  when: proxy_node_discovery_enabled | bool

- name: Create stub backends.generated.lua
  become: true
  copy:
    content: |
      -- Stub created by Ansible; replaced by node-discovery service at runtime.
      local c = ngx.shared.backend_cache
      c:flush_all()
    dest: "{{ proxy_node_discovery_output_file }}"
    mode: '0644'
    force: no
  when: proxy_node_discovery_enabled | bool

- name: Render conf.d templates
  become: true
  template:
    src: "conf.d/{{ item }}.j2"
    dest: "/usr/local/openresty/nginx/conf/conf.d/{{ item }}"
    mode: '0644'
  loop:
    - http-base.conf
    - backend-select.lua
    - proxy-headers.conf
    - proxy-location.conf
  notify: reload openresty

- name: Render secure-rpc-locations.conf
  become: true
  template:
    src: conf.d/secure-rpc-locations.conf.j2
    dest: /usr/local/openresty/nginx/conf/conf.d/secure-rpc-locations.conf
    mode: '0644'
  when: proxy_unlimited_domains | length > 0
  notify: reload openresty

# Initial render with proxy_https_ready undefined → port 80 serves content so
# certbot's webroot challenge works. Re-rendered below once the cert exists.
- name: Render initial OpenResty config (HTTP)
  become: true
  template:
    src: openresty.conf.j2
    dest: /usr/local/openresty/nginx/conf/nginx.conf
    mode: '0644'
  notify: reload openresty

- name: Ensure OpenResty is running
  become: true
  systemd:
    name: openresty
    state: started
    enabled: yes

# Cert acquisition needs /.well-known/acme-challenge/ active now, but
# `notify: reload openresty` defers until end of play — flush so it lands.
- name: Flush handlers so config changes apply before certbot runs
  meta: flush_handlers

- name: Try restoring certs from S3
  import_tasks: s3_certs.yaml
  when:
    - proxy_ssl_enabled | bool
    - proxy_cert_s3_bucket | length > 0

# Failure here (rate limit, DNS, etc.) is non-fatal: the stat checks below set
# proxy_https_ready=false and the play continues on HTTP.
- name: Obtain SSL certificate for all domains (single cert with SANs)
  become: true
  shell: |
    certbot certonly --webroot \
      -w {{ proxy_certbot_webroot }} \
      {% for domain in _proxy_all_cert_domains %}-d {{ domain }} {% endfor %} \
      --non-interactive \
      --agree-tos \
      --email {{ proxy_certbot_email }} \
      --keep-until-expiring
  register: certbot_result
  failed_when: false
  changed_when: "'Successfully received certificate' in (certbot_result.stdout | default(''))"
  when:
    - proxy_ssl_enabled | bool
    - _proxy_all_cert_domains | length > 0
    - not (proxy_cert_restored | default(false))

- name: Assess existing cert for HTTPS readiness (post-certbot)
  include_tasks: _assess_cert.yaml
  vars:
    _check_path: "{{ proxy_letsencrypt_live_dir }}"
    _check_threshold_days: 0          # servable now; this gate only activates HTTPS, never downgrades
  when: proxy_ssl_enabled | bool

- name: Set HTTPS readiness flag (post-certbot)
  set_fact:
    proxy_https_ready: "{{ _check_cert_ok | default(false) }}"
  when: proxy_ssl_enabled | bool

- name: Back up current Let's Encrypt state to S3 (tarball preserves symlinks)
  become: true
  shell: |
    set -euo pipefail
    tarball="$(mktemp /tmp/proxy-letsencrypt-backup.XXXXXX.tar.gz)"
    trap 'rm -f "$tarball"' EXIT
    tar czf "$tarball" --exclude='*.log' -C /etc letsencrypt
    {{ proxy_aws_cli_bin }} s3 cp "$tarball" \
      "s3://{{ proxy_cert_s3_bucket }}/{{ proxy_cert_s3_key }}" \
      --region {{ proxy_cert_s3_region }} --quiet
  args:
    executable: /bin/bash
  # Best-effort S3 side effect, not host state -> changed_when: false. The
  # tightened `when` skips the upload on steady-state re-runs (cert restored /
  # already fresh and certbot was a no-op) so we don't re-tar+upload an
  # identical tree every run.
  changed_when: false
  when:
    - proxy_ssl_enabled | bool
    - proxy_cert_s3_bucket | length > 0
    - proxy_https_ready | default(false)
    - (certbot_result is defined and certbot_result is changed) or not (proxy_cert_restored | default(false))

- name: Warn if HTTPS config is not ready (proxy running on HTTP only)
  ansible.builtin.debug:
    msg: "OpenResty is running on HTTP (port {{ proxy_listen_port }}). HTTPS will activate once a valid certificate bundle is available on a later run."
  when:
    - proxy_ssl_enabled | bool
    - not (proxy_https_ready | default(false))

- name: Re-render OpenResty config (HTTPS active)
  become: true
  template:
    src: openresty.conf.j2
    dest: /usr/local/openresty/nginx/conf/nginx.conf
    mode: '0644'
  when: proxy_https_ready | default(false)
  notify: reload openresty

- name: Ensure letsencrypt renewal-hooks dir
  become: true
  file:
    path: /etc/letsencrypt/renewal-hooks/post
    state: directory
    mode: '0755'
  when:
    - proxy_ssl_enabled | bool
    - proxy_cert_s3_bucket | length > 0

- name: Install S3 upload renewal hook
  become: true
  template:
    src: s3-upload-hook.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/post/upload-to-s3.sh
    mode: '0755'
  when:
    - proxy_ssl_enabled | bool
    - proxy_cert_s3_bucket | length > 0

# When the S3 upload hook is installed it already reloads openresty after
# renewal; otherwise we need an explicit --post-hook here.
- name: Setup certbot renewal cron
  become: true
  cron:
    name: "certbot renewal"
    minute: "0"
    hour: "3"
    job: "certbot renew --quiet{% if proxy_cert_s3_bucket | length == 0 %} --post-hook 'systemctl reload openresty'{% endif %}"
  when: proxy_ssl_enabled | bool

# Installing node-discovery last means the (slow) Rust build doesn't delay
# initial availability — nginx is already serving on the stub + static fallbacks.
- name: Install and start node-discovery service
  import_tasks: node_discovery.yaml
  when: proxy_node_discovery_enabled | bool

- name: Configure proxy telegraf monitoring
  import_tasks: telegraf.yaml

- name: Configure proxy log export
  import_tasks: alloy.yaml
  when: proxy_enable_logs_export | bool
