---
# Builds ngx_http_vhost_traffic_status_module.so for per-vhost / per-upstream
# / per-status metrics. openresty.conf.j2 emits `load_module` and the
# 127.0.0.1:{{ proxy_vts_status_port }}/vts_status endpoint; telegraf-proxy.conf
# scrapes it via inputs.nginx_vts.

- name: Build VTS dynamic module
  include_tasks: _build_dynamic_module.yaml
  vars:
    module_name: vts
    module_so_name: ngx_http_vhost_traffic_status_module.so
    module_src_dir: nginx-module-vts
    module_repo: "{{ proxy_vts_module_repo }}"
    module_version: "{{ proxy_vts_module_version }}"
