---
# Shared "build OpenResty dynamic .so" pattern (used by vts.yaml, geoip.yaml).
# Skips rebuild when the recorded buildinfo matches (openresty version, repo, tag).
#
# Required vars:
#   module_name          short label (e.g. "vts", "geoip2")
#   module_so_name       installed .so basename (e.g. "ngx_http_geoip2_module.so")
#   module_src_dir       clone destination basename under /usr/local/src/
#   module_repo          git URL
#   module_version       git tag/branch/sha
# Optional:
#   extra_apt_packages   additional build deps beyond the OpenResty baseline

- name: Install {{ module_name }} build dependencies
  become: true
  apt:
    name: "{{ ['build-essential', 'libpcre3-dev', 'libssl-dev', 'zlib1g-dev', 'wget', 'tar', 'git'] + (extra_apt_packages | default([])) }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Stat {{ module_name }} module + buildinfo
  become: true
  stat:
    path: "/usr/local/openresty/nginx/modules/{{ item }}"
  register: _dynmod_stats
  loop:
    - "{{ module_so_name }}"
    - "{{ module_so_name }}.buildinfo"

# `openresty -v` writes `nginx version: openresty/X.Y.Z.W` to stderr.
- name: Detect OpenResty version
  command: openresty -v
  register: _dynmod_openresty_v
  changed_when: false

- name: Read recorded {{ module_name }} buildinfo
  become: true
  slurp:
    path: "/usr/local/openresty/nginx/modules/{{ module_so_name }}.buildinfo"
  register: _dynmod_buildinfo_raw
  when: _dynmod_stats.results[1].stat.exists

- name: Compute {{ module_name }} build key
  set_fact:
    _dynmod_openresty_ver: "{{ (_dynmod_openresty_v.stderr | regex_search('openresty/([0-9.]+)', '\\1'))[0] }}"

- name: Decide whether {{ module_name }} rebuild is needed
  set_fact:
    _dynmod_build_key: "openresty={{ _dynmod_openresty_ver }};repo={{ module_repo }};version={{ module_version }}"
    _dynmod_rebuild_needed: >-
      {{
        (not _dynmod_stats.results[0].stat.exists)
        or (not _dynmod_stats.results[1].stat.exists)
        or ((_dynmod_buildinfo_raw.content | default('') | b64decode | trim)
            != 'openresty=' + _dynmod_openresty_ver
            + ';repo=' + module_repo
            + ';version=' + module_version)
      }}

- name: Download OpenResty source tarball
  become: true
  get_url:
    url: "https://openresty.org/download/openresty-{{ _dynmod_openresty_ver }}.tar.gz"
    dest: "/usr/local/src/openresty-{{ _dynmod_openresty_ver }}.tar.gz"
    mode: '0644'
  when: _dynmod_rebuild_needed

- name: Extract OpenResty source
  become: true
  unarchive:
    src: "/usr/local/src/openresty-{{ _dynmod_openresty_ver }}.tar.gz"
    dest: /usr/local/src/
    remote_src: yes
    creates: "/usr/local/src/openresty-{{ _dynmod_openresty_ver }}/configure"
  when: _dynmod_rebuild_needed

- name: Clone {{ module_name }} module source
  become: true
  git:
    repo: "{{ module_repo }}"
    dest: "/usr/local/src/{{ module_src_dir }}"
    version: "{{ module_version }}"
    force: yes
  when: _dynmod_rebuild_needed

# OpenResty's bundle puts the nginx Makefile under build/nginx-*/; we cd there
# after configure and run `make modules` only.
- name: Configure and build {{ module_name }} dynamic module
  become: true
  shell: |
    set -e
    cd /usr/local/src/openresty-{{ _dynmod_openresty_ver }}
    ./configure --with-compat --add-dynamic-module=/usr/local/src/{{ module_src_dir }}
    cd build/nginx-[0-9]*
    make modules
  args:
    executable: /bin/bash
  when: _dynmod_rebuild_needed

- name: Locate built {{ module_so_name }}
  become: true
  find:
    paths: "/usr/local/src/openresty-{{ _dynmod_openresty_ver }}/build"
    patterns: "{{ module_so_name }}"
    recurse: yes
  register: _dynmod_so_built
  when: _dynmod_rebuild_needed

- name: Install {{ module_so_name }}
  become: true
  copy:
    src: "{{ _dynmod_so_built.files[0].path }}"
    dest: "/usr/local/openresty/nginx/modules/{{ module_so_name }}"
    mode: '0755'
    owner: root
    group: root
    remote_src: yes
  when: _dynmod_rebuild_needed
  notify: reload openresty

- name: Record {{ module_name }} build metadata
  become: true
  copy:
    content: "{{ _dynmod_build_key }}\n"
    dest: "/usr/local/openresty/nginx/modules/{{ module_so_name }}.buildinfo"
    mode: '0644'
    owner: root
    group: root
  when: _dynmod_rebuild_needed
