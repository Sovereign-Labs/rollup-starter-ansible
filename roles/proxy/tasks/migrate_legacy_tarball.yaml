---
# One-shot migration from the legacy bash-repo S3 layout
# (`s3://<bucket>/letsencrypt.tar.gz`) to the new per-file layout
# (`s3://<bucket>/<prefix>/...` via `aws s3 sync`). Triggered only when the
# per-file sync returned no objects (empty prefix). The main play's S3 upload
# step repopulates the per-file layout, so subsequent runs skip this path.

- name: Attempt legacy letsencrypt.tar.gz download
  become: true
  command: >
    {{ proxy_aws_cli_bin }} s3 cp
    s3://{{ proxy_cert_s3_bucket }}/letsencrypt.tar.gz
    /tmp/letsencrypt.tar.gz
    --region {{ proxy_cert_s3_region }}
  register: _legacy_tarball_cp
  changed_when: _legacy_tarball_cp.rc == 0
  failed_when: false
  when: (_s3_restore.stdout | default('')) | length == 0

- name: Extract legacy letsencrypt.tar.gz into /etc
  become: true
  unarchive:
    src: /tmp/letsencrypt.tar.gz
    dest: /etc
    remote_src: yes
  when: _legacy_tarball_cp.rc | default(1) == 0

- name: Clean up legacy tarball
  become: true
  file:
    path: /tmp/letsencrypt.tar.gz
    state: absent
  when: _legacy_tarball_cp.rc | default(1) == 0
