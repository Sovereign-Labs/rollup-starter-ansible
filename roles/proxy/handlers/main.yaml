---
- name: reload systemd
  become: true
  ansible.builtin.systemd:
    daemon_reload: yes

- name: reload openresty
  become: true
  ansible.builtin.systemd:
    name: openresty
    state: reloaded

- name: restart telegraf
  become: true
  ansible.builtin.systemd:
    name: telegraf
    state: restarted

- name: restart alloy
  become: true
  ansible.builtin.systemd:
    name: alloy
    state: restarted

- name: restart node-discovery
  become: true
  ansible.builtin.systemd:
    name: node-discovery
    state: restarted
    daemon_reload: yes
