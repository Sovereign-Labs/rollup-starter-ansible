---
- name: reload systemd
  become: true
  ansible.builtin.systemd:
    daemon_reload: yes

# daemon_reload picks up the timer drop-in; restart re-arms the new schedule.
# Notified only by the hourly.conf copy, so it fires only when that file changes.
- name: restart logrotate timer
  become: true
  ansible.builtin.systemd:
    name: logrotate.timer
    state: restarted
    enabled: yes
    daemon_reload: yes

- name: reload openresty
  become: true
  ansible.builtin.systemd:
    name: openresty
    state: reloaded

# Used when systemd unit-level changes need to land (e.g. LimitNOFILE override).
# SIGHUP from `reload openresty` does not re-read those.
- name: restart openresty
  become: true
  ansible.builtin.systemd:
    name: openresty
    state: restarted

- name: restart telegraf
  become: true
  ansible.builtin.systemd:
    name: telegraf
    state: restarted

- name: restart alloy
  become: true
  ansible.builtin.systemd:
    name: alloy
    state: restarted

- name: restart node-discovery
  become: true
  ansible.builtin.systemd:
    name: node-discovery
    state: restarted
    daemon_reload: yes
