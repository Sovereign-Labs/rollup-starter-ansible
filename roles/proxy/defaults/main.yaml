---
# Proxy Configuration - OpenResty reverse proxy for Sovereign rollup

# SSL/TLS Configuration
proxy_ssl_enabled: false
proxy_domain_name: ""  # Required when SSL enabled
proxy_unlimited_domains: []  # Additional domains for SSL certs and rate limit exemption

# Backend Configuration
# proxy_rollup_leader_ip: ""  # REQUIRED - Primary node IP (handles writes)
proxy_rollup_follower_ip: ""  # Replica node IP (defaults to leader if empty)
# Backend port: uses rollup_http_port from rollup role (default: 12346)

# Listen Ports
proxy_listen_port: 80
proxy_listen_port_ssl: 443

# Rate Limiting
proxy_rate_limit_enabled: true
proxy_rate_limit_rate: "100r/s"
proxy_rate_limit_burst: 50
proxy_rate_limit_exempt_ips: []

# DNS Resolver (empty = system default)
proxy_dns_resolver: ""

# Timeouts
proxy_websocket_timeout: "3600s"
proxy_connect_timeout: "5s"

# Certbot Configuration
proxy_certbot_webroot: "/var/www/certbot"
proxy_certbot_email: "info@sovlabs.io"  # Required when SSL enabled

# Observability
proxy_enable_logs_export: false  # Enable log export to Grafana Loki via Alloy

# S3 Certificate Backup/Restore (optional)
# When proxy_cert_s3_bucket is set, Let's Encrypt state is synced to/from S3 so a
# replacement proxy instance boots straight into HTTPS (zero-downtime replacement).
# The instance must have IAM permissions on the bucket:
#   s3:GetObject, s3:ListBucket, s3:PutObject, s3:DeleteObject
proxy_cert_s3_bucket: ""                # empty = S3 sync disabled
proxy_cert_s3_region: ""                # required when bucket set
proxy_cert_s3_prefix: "letsencrypt/"    # keep trailing slash
proxy_cert_expiry_threshold_days: 30    # re-issue if restored cert expires sooner

# Dynamic Backend Discovery (node-discovery Rust service)
# When enabled, a systemd service builds and runs node-discovery, which
# subscribes to PostgreSQL for cluster topology changes, writes Lua to
# `proxy_node_discovery_output_file`, and issues `nginx -s reload` on change.
# This enables automatic failover/scale without re-running Ansible.
# When disabled (default), backend IPs are baked statically from
# proxy_rollup_leader_ip / proxy_rollup_follower_ip.
proxy_node_discovery_enabled: false
# DB connection is shared with the rollup: node-discovery uses
# `rollup_sequencer_postgres_connection_string` (set by roles/rollup/tasks/postgres.yaml
# or by the operator in runtime_vars).
proxy_node_discovery_output_file: "/usr/local/openresty/nginx/conf/backends.generated.lua"
proxy_node_discovery_max_age_millis: 1000
proxy_node_discovery_repo: "https://github.com/Sovereign-Labs/rollup-starter.git"
proxy_node_discovery_branch: "main"
proxy_node_discovery_commit_hash: ""    # takes priority over branch if set
proxy_node_discovery_repo_dir: "rollup-starter-node-discovery"  # under /home/ubuntu/
